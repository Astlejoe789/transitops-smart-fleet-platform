name: TransitOps CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
        
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run API Tests
      run: npm test --workspace=@transitops/api --if-present
      
    - name: Run Web Tests
      run: npm test --workspace=@transitops/web --if-present
      
    - name: Build API
      run: npm run build --workspace=@transitops/api
      
    - name: Build Web
      run: npm run build --workspace=@transitops/web
